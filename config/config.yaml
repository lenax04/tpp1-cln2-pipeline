# config/config.yaml
# =================
# Pipeline configuration for TPP1 variant pathogenicity classification.
# Gene: TPP1 (tripeptidyl peptidase 1)
# Disease: late infantile neuronal ceroid lipofuscinosis (CLN2 disease)

gene_symbol: "TPP1"
inheritance: "autosomal_recessive"

# Database versions
vep_version: "115"
gnomad_version: "4.1.0"
clinvar_version: "2026-03-21"

# Evidence thresholds
pm2_threshold: 0.005
bs1_threshold: 0.01
ba1_threshold: 0.05

# Critical functional domains (amino acids)
critical_domains:
  - name: "propeptide_region"
    aa_start: 20
    aa_end: 195
  - name: "catalytic_domain"
    aa_start: 368
    aa_end: 563

# In silico thresholds (REVEL)
revel_thresholds:
  strong: 0.932
  moderate: 0.773
  supporting: 0.644
  benign_supporting: 0.290
  benign_moderate: 0.183

# Splicing thresholds (SpliceAI)
spliceai_thresholds:
  strong: 0.8
  moderate: 0.5
  supporting: 0.2

# Output files
raw_vcf: "data/TPP1_raw.vcf"
normalized_vcf: "results/TPP1/TPP1_normalized.vcf"
annotated_vcf: "results/TPP1/TPP1_annotated.vcf"
classified_tsv: "results/TPP1/classification/TPP1_acmg_classified.tsv"
report_html: "results/report/pipeline_report.html"
